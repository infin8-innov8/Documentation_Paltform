{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container" style="text-align: center;">

        <div
            style="display:inline-flex; align-items:center; justify-content:center; width:64px; height:64px; background:rgba(16,185,129,0.1); color:var(--success); border-radius:50%; font-size:2.2rem; margin-bottom:1.5rem;">
            ✅
        </div>
        <h2 class="auth-title">Reset Complete</h2>
        <p class="auth-subtitle" style="margin-bottom: 2rem;">Your new password has been set successfully. You can now
            log in to the TIC MATRIX platform.</p>

        <a href="{% url 'login' %}" class="btn-primary"
            style="display:inline-block; text-align:center; width:auto; padding: 0.8rem 2.5rem;">Log in now</a>
    </div>
</div>
{% endblock %}
