{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">

        <div style="text-align:center; margin-bottom:1.5rem;">
            <div
                style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; background:linear-gradient(135deg, rgba(14,165,233,0.1), rgba(14,165,233,0.05)); border:1.5px solid rgba(14,165,233,0.25); border-radius:14px; margin-bottom:1rem; font-size:1.6rem;">
                🔑</div>
            <h2 class="auth-title">Create New Password</h2>
            <p class="auth-subtitle">Your identity has been verified. Please create a strong, new password.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" name="new_password" id="new_password" class="form-control" required
                    placeholder="Enter new password...">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" required
                    placeholder="Re-enter new password...">
            </div>
            <button type="submit" class="btn-primary">Set New Password</button>
        </form>

        <div style="text-align:center; margin-top:1.5rem;">
            <a href="{% url 'profile' %}"
                style="color:var(--text-muted); font-size:0.85rem; font-weight:600;">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
