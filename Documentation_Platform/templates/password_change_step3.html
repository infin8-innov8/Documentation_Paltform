{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container auth-card-professional">

        <!-- Top Status Bar -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <div class="security-badge-soft">🛡️ Step 3: Deployment</div>
            <div style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">Protocol: TIC-NEW-CRED</div>
        </div>

        <div style="text-align:center; margin-bottom:2rem;">
            <div class="security-icon-large">🔑</div>
            <h2 class="auth-title">Commit New Access Key</h2>
            <p class="auth-subtitle">Finalize your credential update by defining a robust new password for your account.
            </p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="new_password">New Secure Password</label>
                <input type="password" name="new_password" id="new_password" class="form-control" required
                    placeholder="Enter new password...">
            </div>
            <div class="form-group">
                <label for="confirm_password">Verify New Password</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" required
                    placeholder="Re-enter to confirm...">
            </div>

            <button type="submit" class="btn-primary" style="margin-top:1rem;">
                Apply Update & Secure Account
            </button>
        </form>

        <div style="text-align:center; margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border);">
            <a href="{% url 'profile' %}"
                style="color:var(--text-muted); font-size:0.85rem; font-weight:600; transition:color 0.2s;">
                Discard & Exit Secure Session
            </a>
        </div>
    </div>
</div>
{% endblock %}
