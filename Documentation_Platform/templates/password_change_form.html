{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">

        <div style="text-align:center; margin-bottom:1.5rem;">
            <div
                style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; background:linear-gradient(135deg,rgba(14,165,233,0.15),rgba(14,165,233,0.05)); border:1.5px solid rgba(14,165,233,0.25); border-radius:14px; margin-bottom:1rem; font-size:1.6rem;">
                🔏</div>
            <h2 class="auth-title">Change Password</h2>
            <p class="auth-subtitle">Update your password to keep your account secure.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div
                style="padding:1.5rem; background:var(--surface2); border:1px solid var(--border); border-radius:8px; margin-bottom:1.5rem;">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn-primary">Update Secure Password</button>
        </form>

        <div style="text-align:center; margin-top:1.5rem;">
            <a href="{% url 'profile' %}"
                style="color:var(--text-muted); font-size:0.85rem; font-weight:600;">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
