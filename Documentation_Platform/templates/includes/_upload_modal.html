<!-- Upload Modal Component -->
<div id="uploadModal" class="upload-modal-overlay" style="display:none;">
    <div class="upload-modal">
        <div class="upload-modal-header">
            <h2>📤 Upload Report</h2>
            <button class="modal-close" onclick="closeUploadModal()">&times;</button>
        </div>

        <form id="uploadForm" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="hidden" name="report_type" value="{{ report_type }}">
            {% if department %}
            <input type="hidden" name="department_id" value="{{ department.department_id }}">
            {% endif %}

            <!-- Drop Zone -->
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-icon">📁</div>
                <p class="drop-zone-text">Drag & drop your <strong>.docx</strong> file here</p>
                <p class="drop-zone-subtext">or click to browse</p>
                <input type="file" name="document" id="fileInput" accept=".docx" style="display:none;" required>
                <div class="selected-file" id="selectedFile" style="display:none;">
                    <span class="file-icon">📄</span>
                    <span class="file-name" id="fileName"></span>
                    <button type="button" class="file-remove" onclick="removeFile()">&times;</button>
                </div>
            </div>

            <!-- Metadata Fields -->
            <div class="upload-fields">
                <div class="field-row">
                    <div class="field-group">
                        <label>Date of Conduction</label>
                        <input type="date" name="date_of_conduction" required>
                    </div>
                    <div class="field-group">
                        <label>Time of Conduction</label>
                        <input type="time" name="time_of_conduction" required>
                    </div>
                </div>

                {% if report_type == 'IDM' or report_type == 'ODM' %}
                <div class="field-group">
                    <label>Agenda of Meeting</label>
                    <input type="text" name="agenda" placeholder="Enter the meeting agenda..." required>
                </div>
                {% endif %}

                {% if report_type == 'BOOTCAMP' %}
                <div class="field-group">
                    <label>Topic of Bootcamp</label>
                    <input type="text" name="topic" placeholder="Enter the bootcamp topic..." required>
                </div>
                {% endif %}

                <div class="field-group">
                    <label>Total Participants (including conductor)</label>
                    <input type="number" name="total_participants" min="1" value="1" required>
                </div>
            </div>

            <!-- Submit -->
            <div class="upload-actions">
                <button type="button" class="btn-cancel" onclick="closeUploadModal()">Cancel</button>
                <button type="submit" class="btn-upload" id="btnUpload">
                    <span class="btn-text">Upload to Drive</span>
                    <span class="btn-loading" style="display:none;">Uploading...</span>
                </button>
            </div>
        </form>

        <!-- Status Messages -->
        <div id="uploadStatus" class="upload-status" style="display:none;"></div>
    </div>
</div>

<style>
    /* ───── Upload Modal ───── */
    .upload-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(12, 26, 46, 0.6);
        backdrop-filter: blur(4px);
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: overlayIn 0.2s ease;
    }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

    .upload-modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        width: 560px;
        max-width: 95vw;
        max-height: 90vh;
        overflow-y: auto;
        padding: 2rem;
        box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes modalIn {
        from { opacity: 0; transform: translateY(20px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .upload-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.5rem;
    }
    .upload-modal-header h2 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text);
    }
    .modal-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        color: var(--text-muted);
        cursor: pointer;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        transition: background 0.15s;
    }
    .modal-close:hover { background: var(--bg); }

    /* Drop Zone */
    .drop-zone {
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 2.5rem;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        background: var(--surface2);
        margin-bottom: 1.5rem;
    }
    .drop-zone:hover, .drop-zone.drag-over {
        border-color: var(--primary);
        background: rgba(14, 165, 233, 0.04);
    }
    .drop-zone-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .drop-zone-text { font-weight: 600; color: var(--text); font-size: 0.95rem; }
    .drop-zone-subtext { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem; }

    .selected-file {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(14, 165, 233, 0.08);
        border: 1px solid rgba(14, 165, 233, 0.2);
        padding: 0.5rem 0.8rem;
        border-radius: 8px;
        margin-top: 1rem;
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--primary-dark);
    }
    .file-remove {
        background: none;
        border: none;
        color: var(--danger);
        font-size: 1.2rem;
        cursor: pointer;
        padding: 0 0.2rem;
    }

    /* Fields */
    .upload-fields {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 1.5rem;
    }
    .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }
    .field-group label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0.35rem;
    }
    .field-group input[type="text"],
    .field-group input[type="date"],
    .field-group input[type="time"],
    .field-group input[type="number"] {
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.9rem;
        color: var(--text);
        background: var(--surface);
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field-group input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.12);
    }

    /* Actions */
    .upload-actions {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
    }
    .btn-cancel {
        padding: 0.65rem 1.3rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text-muted);
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
    }
    .btn-cancel:hover { background: var(--bg); }

    .btn-upload {
        padding: 0.65rem 1.6rem;
        border: none;
        border-radius: 8px;
        background: var(--primary);
        color: white;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s, transform 0.15s;
        box-shadow: 0 2px 10px rgba(14, 165, 233, 0.3);
    }
    .btn-upload:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
    }
    .btn-upload:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Status */
    .upload-status {
        margin-top: 1rem;
        padding: 0.8rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 500;
    }
    .upload-status.success { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.25); }
    .upload-status.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
</style>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const selectedFile = document.getElementById('selectedFile');
    const fileName = document.getElementById('fileName');

    // Click to browse
    dropZone.addEventListener('click', (e) => {
        if (e.target.closest('.file-remove')) return;
        fileInput.click();
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) showSelectedFile(fileInput.files[0]);
    });

    // Drag & drop
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith('.docx')) {
            const dt = new DataTransfer();
            dt.items.add(file);
            fileInput.files = dt.files;
            showSelectedFile(file);
        } else {
            alert('Only .docx files are accepted.');
        }
    });

    function showSelectedFile(file) {
        fileName.textContent = file.name;
        selectedFile.style.display = 'inline-flex';
        document.querySelector('.drop-zone-text').textContent = 'File selected:';
        document.querySelector('.drop-zone-subtext').style.display = 'none';
        document.querySelector('.drop-zone-icon').style.display = 'none';
    }

    function removeFile() {
        fileInput.value = '';
        selectedFile.style.display = 'none';
        document.querySelector('.drop-zone-text').innerHTML = 'Drag & drop your <strong>.docx</strong> file here';
        document.querySelector('.drop-zone-subtext').style.display = 'block';
        document.querySelector('.drop-zone-icon').style.display = 'block';
    }

    function openUploadModal() { document.getElementById('uploadModal').style.display = 'flex'; }
    function closeUploadModal() {
        document.getElementById('uploadModal').style.display = 'none';
        document.getElementById('uploadStatus').style.display = 'none';
        removeFile();
        document.getElementById('uploadForm').reset();
    }

    // Form submit via AJAX
    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnUpload');
        const statusDiv = document.getElementById('uploadStatus');
        btn.disabled = true;
        btn.querySelector('.btn-text').style.display = 'none';
        btn.querySelector('.btn-loading').style.display = 'inline';

        try {
            const formData = new FormData(this);
            const response = await fetch("{% url 'upload_report' %}", {
                method: 'POST',
                body: formData,
            });
            const data = await response.json();

            statusDiv.style.display = 'block';
            if (data.success) {
                statusDiv.className = 'upload-status success';
                statusDiv.textContent = '✅ ' + data.message;
                setTimeout(() => { location.reload(); }, 1500);
            } else {
                statusDiv.className = 'upload-status error';
                statusDiv.textContent = '❌ ' + data.error;
            }
        } catch (err) {
            statusDiv.style.display = 'block';
            statusDiv.className = 'upload-status error';
            statusDiv.textContent = '❌ Network error. Please try again.';
        } finally {
            btn.disabled = false;
            btn.querySelector('.btn-text').style.display = 'inline';
            btn.querySelector('.btn-loading').style.display = 'none';
        }
    });
</script>
