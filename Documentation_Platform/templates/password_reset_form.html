{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">

        <div style="text-align:center; margin-bottom:1.5rem;">
            <div
                style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; background:linear-gradient(135deg,rgba(14,165,233,0.15),rgba(14,165,233,0.05)); border:1.5px solid rgba(14,165,233,0.25); border-radius:14px; margin-bottom:1rem; font-size:1.6rem;">
                🔑</div>
            <h2 class="auth-title">Reset Password</h2>
            <p class="auth-subtitle">Enter your email address to receive instructions for resetting your password.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="{{ form.email.id_for_label }}">Email</label>
                {{ form.email }}
            </div>
            <button type="submit" class="btn-primary">Send Reset Link</button>
        </form>

        <div style="text-align:center; margin-top:1.5rem;">
            <a href="{% url 'login' %}" style="color:var(--primary); font-size:0.85rem; font-weight:600;">← Back to
                login</a>
        </div>
    </div>
</div>
{% endblock %}
