{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container" style="text-align: center;">

        <div
            style="display:inline-flex; align-items:center; justify-content:center; width:64px; height:64px; background:rgba(16,185,129,0.1); color:var(--success); border-radius:50%; font-size:2rem; margin-bottom:1.5rem;">
            ✉️
        </div>
        <h2 class="auth-title" style="color: var(--text);">Check Your Inbox</h2>
        <p class="auth-subtitle" style="margin-bottom: 2rem;">We've emailed you instructions for setting your password.
            If an account exists with the email you entered, you should receive them shortly.</p>

        <a href="{% url 'login' %}" class="btn-primary"
            style="display:inline-block; text-align:center; width:auto; padding: 0.8rem 2rem;">Return to Login</a>
    </div>
</div>
{% endblock %}
