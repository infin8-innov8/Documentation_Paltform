{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container auth-card-professional">

        <!-- Top Status Bar -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <div class="security-badge-soft" style="background:rgba(14,165,233,0.1); color:var(--primary);">🛡️ Step 2:
                Multi-Factor</div>
            <div style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">TIC-MFA-CHG</div>
        </div>

        <div style="text-align:center; margin-bottom:2rem;">
            <div class="security-icon-large"
                style="background:linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(16, 185, 129, 0.05)); border-color:var(--success); color:var(--success);">
                📩</div>
            <h2 class="auth-title">Security Code</h2>
            <p class="auth-subtitle">We have dispatched a 6-digit verification sequence to <strong>{{ request.user.email
                    }}</strong>.</p>
        </div>

        <form method="post" id="otp-form">
            {% csrf_token %}
            <div class="otp-input-container">
                <input type="text" class="otp-field" maxlength="1" pattern="\d" required autofocus>
                <input type="text" class="otp-field" maxlength="1" pattern="\d" required>
                <input type="text" class="otp-field" maxlength="1" pattern="\d" required>
                <input type="text" class="otp-field" maxlength="1" pattern="\d" required>
                <input type="text" class="otp-field" maxlength="1" pattern="\d" required>
                <input type="text" class="otp-field" maxlength="1" pattern="\d" required>
            </div>

            <input type="hidden" name="otp" id="final-otp">

            <button type="submit" class="btn-primary"
                style="margin-top:1rem; background:var(--success); border-color:var(--success); box-shadow:0 4px 14px rgba(16,185,129,0.25);">
                Authenticate Code
            </button>
        </form>

        <div style="text-align:center; margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border);">
            <a href="{% url 'password_change' %}"
                style="color:var(--text-muted); font-size:0.85rem; font-weight:600; display:inline-flex; align-items:center; gap:0.5rem;">
                Didn't receive code? <span style="color:var(--primary);">Resend Protocol</span>
            </a>
        </div>
    </div>
</div>

<script>
    const fields = document.querySelectorAll('.otp-field');
    const finalOtp = document.getElementById('final-otp');
    const form = document.getElementById('otp-form');

    fields.forEach((field, index) => {
        field.addEventListener('input', (e) => {
            if (e.target.value.length === 1 && index < fields.length - 1) {
                fields[index + 1].focus();
            }
            updateFinalValue();
        });

        field.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                fields[index - 1].focus();
            }
        });
    });

    function updateFinalValue() {
        let value = '';
        fields.forEach(field => value += field.value);
        finalOtp.value = value;
    }

    form.addEventListener('submit', (e) => {
        updateFinalValue();
        if (finalOtp.value.length !== 6) {
            e.preventDefault();
            alert('Please enter all 6 digits.');
        }
    });
</script>
{% endblock %}
