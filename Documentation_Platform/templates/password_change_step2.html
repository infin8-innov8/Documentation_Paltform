{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">

        <div style="text-align:center; margin-bottom:1.5rem;">
            <div
                style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; background:linear-gradient(135deg, rgba(16,185,129,0.1), rgba(16,185,129,0.05)); border:1.5px solid rgba(16,185,129,0.25); border-radius:14px; margin-bottom:1rem; font-size:1.6rem; color:var(--success);">
                📩</div>
            <h2 class="auth-title">Enter Verification Code</h2>
            <p class="auth-subtitle">We emailed a 6-digit one-time password (OTP) to <strong>{{ request.user.email
                    }}</strong>. Please enter it below.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="otp">6-Digit OTP</label>
                <input type="text" name="otp" id="otp" class="form-control" required placeholder="000000" maxlength="6"
                    style="text-align:center; letter-spacing:0.5em; font-size:1.2rem; font-family:monospace;">
            </div>
            <button type="submit" class="btn-primary"
                style="background:var(--success); border-color:var(--success); box-shadow: 0 4px 14px rgba(16,185,129,0.3);">Verify
                Code</button>
        </form>

        <div style="text-align:center; margin-top:1.5rem;">
            <a href="{% url 'password_change' %}"
                style="color:var(--text-muted); font-size:0.85rem; font-weight:600;">Resend OTP / Back</a>
        </div>
    </div>
</div>
{% endblock %}
