{% extends 'base.html' %}

{% block content %}
<style>
    .welcome-container {
        text-align: center;
        padding: 4rem 2rem;
        background: linear-gradient(135deg, var(--navy) 0%, #1e3a5f 100%);
        border-radius: var(--radius);
        color: white;
        box-shadow: 0 10px 30px rgba(14, 165, 233, 0.15);
        border: 1px solid rgba(14, 165, 233, 0.25);
        animation: fadeSlideDown 0.5s ease-out forwards;
    }

    .welcome-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        animation: pulse 3s infinite;
    }

    .welcome-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
    }

    .welcome-subtitle {
        font-size: 1.1rem;
        color: #e2f4ff;
        opacity: 0.8;
    }

    @keyframes fadeSlideDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes pulse {

        0%,
        100% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.1);
        }
    }
</style>

<div class="welcome-container">
    <div class="welcome-icon">👋</div>
    <h1 class="welcome-title">Welcome to TIC Matrix Documentation Platform</h1>
    <p class="welcome-subtitle">We're glad to see you. Please use the navigation menu on the left to access your
        documents and reports.</p>
</div>
{% endblock %}
