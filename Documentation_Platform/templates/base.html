<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation Platform</title>
    <style>
        :root {
            --primary-color: #f73859;
            --text-color: #2b2b2b;
            --text-muted: #6b6b6b;
            --bg-color: #fcfcfc;
            --border-color: #eaeaea;
            --card-hover: #f1f1f1;
            --sidebar-active: #f1f2f6;
            --btn-bg: #d0cbf2;
            --btn-text: #2c2560;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Top Navigation */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: white;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #2c2560;
        }
        
        .logo-icon {
            color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .nav-links a.active {
            color: var(--primary-color);
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-bar {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: #f8f9fa;
            width: 250px;
            font-family: inherit;
        }

        .btn-auth {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-auth:hover {
            opacity: 0.8;
        }

        /* Main Layout */
        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 70px);
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            padding: 2rem 1rem;
            border-right: 1px solid var(--border-color);
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-link {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-weight: 600;
            color: var(--text-color);
            transition: background 0.2s;
        }

        .sidebar-link.active {
            background-color: var(--sidebar-active);
            color: #1a1a1a;
        }

        .sidebar-link:hover:not(.active) {
            background-color: #fafafa;
        }

        /* Content Area */
        .content {
            flex: 1;
            padding: 3rem 4rem;
        }

        /* Auth Form Styles */
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
        }

        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: var(--btn-text);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }

        .messages {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 6px;
            background: #feeced;
            color: #dc2626;
            border: 1px solid #f8aba6;
        }

    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <span class="logo-icon">▲</span> PUNCHLIST
        </div>
        <nav class="nav-links">
            <a href="{% url 'home' %}" class="active">Homepage</a>
            <a href="#">Integrations</a>
            <a href="#">Pricing</a>
            <a href="#">Case Studies</a>
        </nav>
        <div class="nav-actions">
            <input type="text" class="search-bar" placeholder="🔍 Search...">
            {% if request.user.is_authenticated %}
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-auth">Logout ({{ request.user.username }})</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn-auth">Login</a>
            {% endif %}
        </div>
    </header>

    <div class="container">
        {% block sidebar %}{% endblock %}
        
        <main class="content">
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
            {% endif %}
            
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
