{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container auth-card-professional">

        <!-- Top Status Bar -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <div class="security-badge-soft">🛡️ Step 1: Verification</div>
            <div style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">Auth Chain: PWD-CHG-s1</div>
        </div>

        <div style="text-align:center; margin-bottom:2rem;">
            <div class="security-icon-large">🔒</div>
            <h2 class="auth-title">Identify Validation</h2>
            <p class="auth-subtitle">To proceed with a credential update, please provide your current access key for
                verification.</p>
        </div>

        <form method="post" style="position:relative; z-index:1;">
            {% csrf_token %}
            <div class="form-group">
                <label for="old_password">Current Secure Password</label>
                <input type="password" name="old_password" id="old_password" class="form-control" required
                    placeholder="Enter current password...">
            </div>

            <button type="submit" class="btn-primary" style="margin-top:1rem;">
                Validate & Generate OTP
            </button>
        </form>

        <div style="text-align:center; margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border);">
            <a href="{% url 'profile' %}"
                style="color:var(--text-muted); font-size:0.85rem; font-weight:600; transition:color 0.2s;">
                Abort Update Procedure
            </a>
        </div>
    </div>
</div>
{% endblock %}
