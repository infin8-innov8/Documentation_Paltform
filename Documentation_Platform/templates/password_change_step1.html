{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">

        <div style="text-align:center; margin-bottom:1.5rem;">
            <div
                style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; background:linear-gradient(135deg, rgba(14,165,233,0.1), rgba(14,165,233,0.05)); border:1.5px solid rgba(14,165,233,0.25); border-radius:14px; margin-bottom:1rem; font-size:1.6rem;">
                🔒</div>
            <h2 class="auth-title">Verify Current Password</h2>
            <p class="auth-subtitle">To change your password securely, we first need to verify your current password.
            </p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="old_password">Current Password</label>
                <input type="password" name="old_password" id="old_password" class="form-control" required
                    placeholder="Enter current password...">
            </div>
            <button type="submit" class="btn-primary">Send Secure OTP</button>
        </form>

        <div style="text-align:center; margin-top:1.5rem;">
            <a href="{% url 'profile' %}"
                style="color:var(--text-muted); font-size:0.85rem; font-weight:600;">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
